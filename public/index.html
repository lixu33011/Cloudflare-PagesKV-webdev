<!DOCTYPE html>
<meta charset="utf-8">
<title>KV 文件分享</title>
<div style="padding:30px;max-width:500px;margin:auto">
  <h2>📤 上传文件</h2>
  <input type="file" id="file"><br><br>
  <button onclick="upload()">上传并生成分享链接</button>
  <div id="result" style="margin-top:20px"></div>
</div>

<script>
async function upload() {
  const f = document.getElementById('file').files[0];
  if (!f) return alert('请选择文件');

  const fd = new FormData();
  fd.append('file', f);

  const res = await fetch('/api/upload', { method: 'POST', body: fd });
  const data = await res.json();

  document.getElementById('result').innerHTML = `
    <h3>✅ 上传成功</h3>
    分享链接：<br>
    <input type="text" value="${data.shareUrl}" style="width:100%;padding:8px">
    <button onclick="copy('${data.shareUrl}')">复制链接</button>
  `;
}

function copy(text) {
  navigator.clipboard.writeText(text);
  alert('已复制');
}
</script>
