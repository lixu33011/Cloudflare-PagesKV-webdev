<!DOCTYPE html>
<meta charset="utf-8">
<title>分享</title>
<h2>文件信息</h2>
<p>文件名：<span id="name"></span></p>
<p>大小：<span id="size"></span></p>
<p>下载地址：</p>
<input id="link" readonly style="width:100%">
<button onclick="copy()">复制下载地址</button>
<a id="down" download style="display:inline-block;margin-top:10px;padding:8px 16px;background:#0070f3;color:white;text-decoration:none">
  直接下载
</a>

<script>
const key = new URLSearchParams(location.search).get('key');

fetch(`/api/${key}`)
  .then(r => r.json())
  .then(d => {
    document.getElementById('name').textContent = d.name;
    document.getElementById('size').textContent = (d.size / 1024).toFixed(2)+'KB';

    // 生成下载链接
    const blobUrl = `data:${d.type};base64,${d.base64}`;
    document.getElementById('link').value = blobUrl;
    document.getElementById('down').href = blobUrl;
  });

function copy() {
  navigator.clipboard.writeText(document.getElementById('link').value);
  alert('已复制');
}
</script>
