<!DOCTYPE html>
<meta charset="utf-8">
<title>文件分享</title>
<div style="padding:30px;max-width:500px;margin:auto">
  <h2>📥 文件下载</h2>
  <p>文件名：<span id="name"></span></p>
  <p>大小：<span id="size"></span> KB</p>
  <p>下载地址：</p>
  <input id="url" readonly style="width:100%;padding:8px">
  <button onclick="copy()">复制地址</button><br><br>
  <a id="down" download style="padding:10px 20px;background:#0070f3;color:white;text-decoration:none">
    直接下载
  </a>
</div>

<script>
const key = location.pathname.split('/')[2];
fetch(`/api/${key}`).then(r=>r.json()).then(d=>{
  document.getElementById('name').textContent = d.name;
  document.getElementById('size').textContent = (d.size/1022).toFixed(2);
  const dataUrl = `data:${d.type};base64,${d.base64}`;
  document.getElementById('url').value = dataUrl;
  document.getElementById('down').href = dataUrl;
});

function copy(){navigator.clipboard.writeText(document.getElementById('url').value);alert('已复制')}
</script>
